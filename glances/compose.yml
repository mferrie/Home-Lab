services:
  glances:
    image: nicolargo/glances:latest
    restart: always
    pid: host
    ports:
      - 61208-61209:61208-61209
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/os-release:/etc/os-release:ro
    environment:
      - "GLANCES_OPT=-w"
secrets:
  glances_password:
    file: ../secrets/glances_password

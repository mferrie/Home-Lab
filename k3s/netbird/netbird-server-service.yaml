apiVersion: v1
kind: Service
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml
    kompose.version: 1.38.0 (a8f5d1cbd)
    traefik.enable: "true"
    traefik.http.routers.netbird-backend.entrypoints: websecure
    traefik.http.routers.netbird-backend.rule: Host(`netbird.mafmanhomelab.dedyn.io`) && (PathPrefix(`/relay`) || PathPrefix(`/ws-proxy/`) || PathPrefix(`/api`) || PathPrefix(`/oauth2`))
    traefik.http.routers.netbird-backend.service: netbird-server
    traefik.http.routers.netbird-backend.tls: "true"
    traefik.http.routers.netbird-grpc.entrypoints: websecure
    traefik.http.routers.netbird-grpc.rule: Host(`netbird.mafmanhomelab.dedyn.io`) && (PathPrefix(`/signalexchange.SignalExchange/`) || PathPrefix(`/management.ManagementService/`))
    traefik.http.routers.netbird-grpc.service: netbird-server-h2c
    traefik.http.routers.netbird-grpc.tls: "true"
    traefik.http.services.netbird-server-h2c.loadbalancer.server.port: "80"
    traefik.http.services.netbird-server-h2c.loadbalancer.server.scheme: h2c
    traefik.http.services.netbird-server.loadbalancer.server.port: "80"
  labels:
    io.kompose.service: netbird-server
  name: netbird-server
spec:
  ports:
    - name: "3478"
      port: 3478
      protocol: UDP
      targetPort: 3478
  selector:
    io.kompose.service: netbird-server

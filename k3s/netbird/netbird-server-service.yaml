apiVersion: v1
kind: Service
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: netbird-server
  name: netbird-server
  namespace: netbird
spec:
  ports:
    - name: "stun"
      port: 3478
      protocol: UDP
      targetPort: 3478
    - name: "http"
      port: 80
      protocol: TCP
      targetPort: 80
  selector:
    io.kompose.service: netbird-server

apiVersion: v1
data:
  config.yaml: |
    # Combined NetBird Server Configuration (Simplified)
    # Generated by getting-started.sh

    server:
      listenAddress: ":80"
      exposedAddress: "https://netbird.mafmanhomelab.dedyn.io:443"
      stunPorts:
        - 3478
      metricsPort: 9090
      healthcheckAddress: ":9000"
      logLevel: "info"
      logFile: "console"

      authSecret: "REDACTED"
      dataDir: "/var/lib/netbird"

      auth:
        issuer: "https://netbird.mafmanhomelab.dedyn.io/oauth2"
        signKeyRefreshEnabled: true
        dashboardRedirectURIs:
          - "https://netbird.mafmanhomelab.dedyn.io/nb-auth"
          - "https://netbird.mafmanhomelab.dedyn.io/nb-silent-auth"
        cliRedirectURIs:
          - "http://localhost:53000/"

      reverseProxy:
        trustedHTTPProxies:
          - "172.30.0.10/32"

      store:
        engine: "sqlite"
        encryptionKey: "REDACTED"
kind: ConfigMap
metadata:
  annotations:
    use-subpath: "true"
  labels:
    io.kompose.service: netbird-server
  name: netbird-server-cm1

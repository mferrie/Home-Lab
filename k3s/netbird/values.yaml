global:
  namespace: 'netbird'
  # Domain name used for access, ex netbird.example.com
  domain:
    global: 'netbird.mafmanhomelab.dedyn.io' # This is the only required domain.  The below ones are optional for if your network topology requires them.
    vpn: 'vpn.netbird.mafmanhomelab.dedyn.io'  # This is the domain used internally by netbird for vpn clients.
  dashboard:
    port: 80
  server:
    port: 80
    stun_port: 3478
    encryption_key:
      valueFrom:
        secretKeyRef:
          name: netbird-secret
          value: encryption_key
  persistence:
    enabled: true
    storageClass: longhorn-ssd
    volumeName: 'data'
    existingClaim: ''
    accessModes:
      - ReadWriteOnce
    size: 4Gi
    volumeMode:
    annotations: {}
    labels: {}
    selector: {}
    dataSource: {}
    overrideVolume:
    overrideVolumeMount:

  ingress:
    enabled: false
    className: ''
    annotations: {}
    extra_hosts: []

  route:
    enabled: true
    vendor: ''
    parentRefs:
      - name: netbird
        namespace: netbird
        sectionName: https
    # STUN likely uses a different port in the gateway, so you can specify a different parent ref here
    stunParentRefs:
      - name: netbird
        namespace: netbird
        sectionName: netbird-stun
    annotations: {}

  serviceAccount:
    create: true
    automount: true
    annotations: { }
    name: ""


dashboard:
  image:
    repository: netbirdio/dashboard
    tag: v2.33.0
    pullPolicy: IfNotPresent
  annotations: {}
  labels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  replicaCount: 1
  resources: {}
  livenessProbe:
  readinessProbe:
  service:
    type: ClusterIP
    annotations: {}
  extra_volumes: []
  extra_volumeMounts: []


server:
  image:
    repository: netbirdio/netbird-server
    tag: 0.66.0
    pullPolicy: IfNotPresent
  annotations: {}
  labels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  replicaCount: 1
  resources: {}
  livenessProbe:
  readinessProbe:
  service:
    type: ClusterIP
    annotations: {}
  extra_volumes: []
  extra_volumeMounts: []
  extra_args: []
  persistence:
    dataDir: /var/lib/netbird
    mountPath: /var/lib/netbird
    configMountPath: /etc/netbird/config.yaml
    subPath: 'server'

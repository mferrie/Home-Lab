apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
  settings.yaml: |
    providers:
      longhorn:
        url: https://longhorn.lan
  custom.css: ""
  custom.js: ""
  bookmarks.yaml: |
    - Developer:
        - Github:
            - abbr: GH
              href: https://github.com/mferrie
  services.yaml: |
    - Infrastructure:
        - Longhorn:
            href: http://longhorn.lan/
            description: Distributed block storage
            siteMonitor: http://longhorn.lan/#/dashboard
    - Apps:
        - Immich:
            icon: sh-immich
            href: http://immich.lan/
            description: Photo storage server
            siteMonitor: http://immich.lan/
        - LGTM Stack:
            icon: sh-grafana
            href: http://grafana.lan/
            description: Cluster metrics
            siteMonitor: http://grafana.lan/
        - Netbird:
            icon: sh-netbird
            href: https://netbird.mafmanhomelab.dedyn.io/
            description: Mesh VPN
            siteMonitor: https://netbird.mafmanhomelab.dedyn.io/
        - NextCloud:
            icon: sh-nextcloud
            href: http://cloud.lan/
            description: NAS server
            siteMonitor: http://cloud.lan/
        - PiHole:
            icon: sh-piholevault
            href: http://pihole.lan/admin
            description: DNS server / sinkhole filter
            siteMonitor: http://pihole.lan/admin
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - resources:
        backend: resources
        expanded: true
        cpu: true
        memory: true
        network: default
    - search:
        provider: duckduckgo
        target: _blank
  docker.yaml: ""
  proxmox.yaml: ""

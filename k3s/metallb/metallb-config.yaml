apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: services-pool
  namespace: metallb-system
spec:
  addresses:
  - 192.168.0.200-192.168.0.201
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: services-l2-ad
  namespace: metallb-system
spec:
  ipAddressPools:
  - services-pool
